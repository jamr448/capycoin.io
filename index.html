<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Capycoin Airdrop</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family: Arial;
background:#0f172a;
color:white;
text-align:center;
padding:40px;
}

.container{
max-width:500px;
margin:auto;
background:#1e293b;
padding:30px;
border-radius:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
margin-top:15px;
padding:12px;
width:100%;
background:#22c55e;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.progress{
margin-top:20px;
background:#334155;
border-radius:10px;
height:20px;
overflow:hidden;
}

.progress-bar{
height:20px;
background:#22c55e;
width:0%;
}

</style>
</head>

<body>

<div class="container">

<h1>🎁 Capycoin Airdrop</h1>

<p>Registra tu wallet para recibir Capycoin</p>

<input id="wallet" placeholder="Pega tu dirección wallet">

<button onclick="registrarWallet()">Registrar Wallet</button>

<p id="mensaje"></p>

<h3>Wallets registradas:</h3>

<h2 id="contador">0</h2>

<div class="progress">
<div id="barra" class="progress-bar"></div>
</div>

</div>

<script>

const supabaseUrl = "https://rnoamoyadtbjueyuitsr.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJub2Ftb3lhZHRianVleXVpdHNyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNDY3NjksImV4cCI6MjA4ODkyMjc2OX0.7xUbwD_pD2znL66S6BModS8rrjQjWubRaFXyB294pSA"

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)

const MAX_WALLETS = 1000


// INICIAR SESION
async function iniciarSesion(){

const { data, error } = await supabase.auth.signInAnonymously()

if(error){
console.log("Error sesión:", error)
}else{
console.log("Sesión iniciada")
await contarWallets()
}

}


// REGISTRAR WALLET
async function registrarWallet(){

const wallet = document.getElementById("wallet").value.trim()

if(wallet.length < 10){
document.getElementById("mensaje").innerText = "Wallet inválida"
return
}

const { error } = await supabase
.from("wallets")
.insert([{ wallet: wallet }])

if(error){

console.log(error)
document.getElementById("mensaje").innerText = "Wallet ya registrada o error"

}else{

document.getElementById("mensaje").innerText = "Wallet registrada 🎉"

document.getElementById("wallet").value=""

contarWallets()

}

}


// CONTAR WALLETS
async function contarWallets(){

const { count, error } = await supabase
.from("wallets")
.select("*",{ count:'exact', head:true })

if(error){
console.log("Error contador:", error)
return
}

document.getElementById("contador").innerText = count

let progreso = (count / MAX_WALLETS) * 100

document.getElementById("barra").style.width = progreso + "%"

}


// INICIAR APP
iniciarSesion()

</script>

</body>
</html>
