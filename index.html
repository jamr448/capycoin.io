<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Capycoin Airdrop</title>

<link rel="stylesheet" href="style.css">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

<h1>🎁 Capycoin Airdrop</h1>

<p>Registra tu wallet para recibir Capycoin</p>

<input id="wallet" placeholder="Pega tu dirección wallet">

<button onclick="registrarWallet()">Registrar Wallet</button>

<p id="mensaje"></p>

<h3>Participantes</h3>

<h2 id="contador">0</h2>

<div class="progress">
<div id="barra" class="progress-bar"></div>
</div>

</div>

<script>

const supabaseUrl = "https://rnoamoyadtbjueyuitsr.supabase.co"
const supabaseKey = "TU_ANON_KEY"

const supabase = window.supabase.createClient(
supabaseUrl,
supabaseKey
)

const MAX_WALLETS = 1000


async function registrarWallet(){

const wallet =
document.getElementById("wallet").value.trim()

if(wallet.length < 10){

document.getElementById("mensaje").innerText =
"Wallet inválida"

return

}

const { error } = await supabase
.from("wallets")
.insert([{ wallet }])

if(error){

document.getElementById("mensaje").innerText =
"Wallet ya registrada"

}else{

document.getElementById("mensaje").innerText =
"Wallet registrada 🎉"

document.getElementById("wallet").value=""

contarWallets()

}

}


async function contarWallets(){

const { count } = await supabase
.from("wallets")
.select("*",{count:'exact',head:true})

document.getElementById("contador").innerText = count

let progreso = (count / MAX_WALLETS) * 100

document
.getElementById("barra")
.style.width = progreso + "%"

}


contarWallets()

</script>

</body>
</html>
